<style>
/* ===== Base ===== */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0b0b0b;
  color: #eee;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

h1 { margin-bottom: 10px; }

/* ===== Controls ===== */
.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* ===== Grid ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
}

.card {
  background: #151515;
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.card h3 {
  margin: 0;
  font-size: 14px;
}

.meta {
  font-size: 12px;
  color: #aaa;
}

.actions {
  display: flex;
  gap: 6px;
}

button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.download { background: #2d5cff; color: white; }
.code { background: #333; color: #fff; }

/* ===== Modal (uses your macOS terminal CSS) ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal.active { display: flex; }

/* Paste of your terminal styles (trimmed slightly for fit) */
.terminal-window {
  width: 90%;
  max-width: 900px;
  border-radius: 14px;
  overflow: hidden;
  background: #1e1e1e;
  box-shadow: 0 25px 60px rgba(0,0,0,0.7);
}
.title-bar {
  height: 38px;
  background: #3a3a3a;
  display: flex;
  align-items: center;
  padding: 0 12px;
  position: relative;
}
.buttons { display: flex; gap: 8px; }
.buttons span { width: 12px; height: 12px; border-radius: 50%; }
.red { background: #ff5f57; }
.yellow { background: #febc2e; }
.green { background: #28c840; }
.title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: #ccc;
  font-size: 13px;
}
.terminal-body {
  padding: 20px;
  max-height: 400px;
  overflow: auto;
  background: radial-gradient(circle at top left, #2a2a2a, #1a1a1a);
  color: #eaeaea;
  font-family: monospace;
}

.close-btn {
  position: absolute;
  right: 10px;
  top: 8px;
  cursor: pointer;
  color: #fff;
}

.copy-btn {
  margin-top: 10px;
  width: 100%;
}
</style>

const grid = document.getElementById('grid');

function render(list){
  grid.innerHTML = '';
  list.forEach(item => {
    const img = new Image();
    img.src = item.gif;

    img.onload = () => {
      const sizeKB = (img.src.length / 1024).toFixed(1); // approx

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${item.gif}" />
        <h3>${item.name}</h3>
        <div class="meta">${item.desc} • ${sizeKB} KB</div>
        <div class="actions">
          <button class="download" onclick="downloadGif('${item.gif}')">Download</button>
          <button class="code" onclick="openModal(\`${item.code}\`)">Code</button>
        </div>
      `;

      grid.appendChild(card);
    }
  });
}

function downloadGif(url){
  const a = document.createElement('a');
  a.href = url;
  a.download = '';
  a.click();
}

function openModal(code){
  document.getElementById('modal').classList.add('active');
  document.getElementById('codeContent').textContent = code;
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

function copyCode(){
  const text = document.getElementById('codeContent').textContent;
  navigator.clipboard.writeText(text);
}

// Search
search.oninput = () => {
  const val = search.value.toLowerCase();
  render(data.filter(d => d.name.toLowerCase().includes(val)));
};

// Sort
sort.onchange = () => {
  let sorted = [...data];
  if(sort.value === 'az') sorted.sort((a,b)=>a.name.localeCompare(b.name));
  if(sort.value === 'za') sorted.sort((a,b)=>b.name.localeCompare(a.name));
  if(sort.value === 'newest') sorted.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(sort.value === 'oldest') sorted.sort((a,b)=>new Date(a.date)-new Date(b.date));
  render(sorted);
};

render(data);
